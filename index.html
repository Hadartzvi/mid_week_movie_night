<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>ערב סרט 🎬</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --pink: #D4537E; --pink-light: #FBEAF0; --pink-mid: #ED93B1; --pink-dark: #993556;
      --purple: #533AB7; --purple-dark: #3C3489;
      --bg: #ffffff; --bg2: #f5f5f3; --text: #1a1a18; --text-muted: #6b6b67;
      --border: rgba(0,0,0,0.12); --radius-md: 8px; --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #1a1a18; --bg2: #242422; --text: #f0ede8; --text-muted: #999990; --border: rgba(255,255,255,0.12); --pink-light: #3a1525; }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg2); color: var(--text); min-height: 100dvh; }
    .app { width: 100%; max-width: 430px; margin: 0 auto; min-height: 100dvh; background: var(--bg); }

    .nav { display: flex; border-bottom: 0.5px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 100; }
    .nav-btn { flex: 1; padding: 14px 4px 10px; background: none; border: none; cursor: pointer; font-size: 11px; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; gap: 4px; transition: color 0.2s; }
    .nav-btn i { font-size: 22px; }
    .nav-btn.active { color: var(--pink); }
    .nav-dot { width: 4px; height: 4px; border-radius: 50%; background: transparent; }
    .nav-btn.active .nav-dot { background: var(--pink); }

    .page { display: none; padding-bottom: 90px; }
    .page.active { display: block; }

    .skel { background: var(--bg2); border-radius: var(--radius-md); animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .skel-poster { width: 200px; height: 300px; border-radius: var(--radius-lg); margin: 0 auto 28px; }
    .skel-card { height: 80px; margin: 0 16px 10px; border-radius: var(--radius-lg); }

    .hero-section { padding: 24px 16px 0; text-align: center; }
    .hero-label { font-size: 11px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
    .hero-title { font-size: 24px; font-weight: 600; margin-bottom: 4px; min-height: 32px; }
    .hero-date { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; min-height: 20px; }
    .poster-stage { position: relative; width: 200px; height: 300px; margin: 0 auto 28px; }
    .poster-img { width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius-lg); border: 0.5px solid var(--border); display: block; }
    .poster-placeholder { width: 100%; height: 100%; border-radius: var(--radius-lg); border: 0.5px solid var(--border); background: var(--bg2); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--text-muted); font-size: 14px; }
    .poster-placeholder i { font-size: 48px; }

    .sold-out-banner { position: absolute; bottom: 16px; left: 0; right: 0; background: rgba(0,0,0,0.78); color: white; font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-align: center; padding: 8px 0; border-radius: 0 0 var(--radius-lg) var(--radius-lg); z-index: 4; }

    .bubble { position: absolute; border-radius: 50%; border: 2.5px solid var(--bg); background: var(--pink-light); display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: default; z-index: 2; width: 48px; height: 48px; animation: float 3s ease-in-out infinite; }
    .bubble:hover { transform: scale(1.15); z-index: 3; }
    .bubble-tip { position: absolute; bottom: -26px; left: 50%; transform: translateX(-50%); background: var(--purple-dark); color: #fff; font-size: 10px; padding: 3px 8px; border-radius: 10px; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .bubble:hover .bubble-tip { opacity: 1; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    .bubble:nth-child(2){animation-delay:0.4s}
    .bubble:nth-child(3){animation-delay:0.8s}
    .bubble:nth-child(4){animation-delay:1.2s}
    .bubble:nth-child(5){animation-delay:1.6s}
    .bubble:nth-child(6){animation-delay:2.0s}
    .bubble:nth-child(7){animation-delay:2.4s}
    .bubble:nth-child(8){animation-delay:2.8s}

    .rsvp-area { padding: 0 16px 20px; }
    .rsvp-box { background: var(--bg2); border-radius: var(--radius-lg); padding: 18px; border: 0.5px solid var(--border); }
    .rsvp-box h3 { font-size: 16px; font-weight: 600; margin-bottom: 14px; }
    .rsvp-input { width: 100%; padding: 11px 14px; border-radius: var(--radius-md); border: 0.5px solid var(--border); background: var(--bg); color: var(--text); font-size: 15px; margin-bottom: 14px; outline: none; }
    .rsvp-input:focus { border-color: var(--pink); }
    .emoji-row { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
    .emoji-opt { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--border); background: var(--bg); cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .emoji-opt.selected { border-color: var(--pink); background: var(--pink-light); }
    .rsvp-btn { width: 100%; padding: 13px; border-radius: var(--radius-md); border: none; background: var(--pink); color: white; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .rsvp-btn:hover { opacity: 0.88; }
    .rsvp-btn:disabled { background: var(--bg2); color: var(--text-muted); border: 0.5px solid var(--border); cursor: default; opacity: 1; }
    .rsvp-btn.sold-out-btn { background: #2c2c2a; color: white; cursor: default; letter-spacing: 0.08em; }
    .attendee-count { text-align: center; font-size: 13px; color: var(--text-muted); margin-top: 12px; }
    .capacity-bar-wrap { margin-top: 10px; }
    .capacity-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
    .capacity-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .capacity-fill { height: 100%; background: var(--pink); border-radius: 2px; transition: width 0.4s; }
    .capacity-fill.full { background: #2c2c2a; }

    .page-header { padding: 24px 16px 0; margin-bottom: 20px; }
    .page-header h2 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
    .page-header p { font-size: 13px; color: var(--text-muted); }
    .month-section { padding: 0 16px; margin-bottom: 28px; }
    .month-label { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 0.5px solid var(--border); }
    .movie-card { display: flex; gap: 12px; padding: 12px; border-radius: var(--radius-lg); border: 0.5px solid var(--border); background: var(--bg); margin-bottom: 10px; cursor: pointer; transition: background 0.15s; align-items: center; }
    .movie-card:hover { background: var(--bg2); }
    .movie-thumb { width: 52px; height: 74px; border-radius: var(--radius-md); background: var(--bg2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 22px; overflow: hidden; position: relative; }
    .movie-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .thumb-sold-out { position: absolute; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; color: white; letter-spacing: 0.06em; border-radius: var(--radius-md); }
    .movie-info { flex: 1; min-width: 0; }
    .movie-info h4 { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
    .movie-info .meta { font-size: 12px; color: var(--text-muted); }
    .attendees-pill { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; background: var(--pink-light); color: var(--pink-dark); padding: 3px 9px; border-radius: 12px; margin-top: 6px; font-weight: 500; }
    .attendees-pill.full { background: #2c2c2a; color: white; }
    .next-badge { font-size: 10px; background: var(--pink); color: white; padding: 2px 7px; border-radius: 10px; margin-left: 6px; font-weight: 600; }
    .sold-out-badge { font-size: 10px; background: #2c2c2a; color: white; padding: 2px 7px; border-radius: 10px; margin-left: 6px; font-weight: 700; letter-spacing: 0.06em; }
    .empty-state { padding: 40px 16px; text-align: center; color: var(--text-muted); }
    .empty-state i { font-size: 48px; margin-bottom: 12px; display: block; }

    .detail-back { display: flex; align-items: center; gap: 6px; padding: 14px 16px; font-size: 14px; color: var(--pink); cursor: pointer; border: none; background: none; font-weight: 500; }
    .detail-poster-wrap { width: 100%; height: 220px; overflow: hidden; background: var(--bg2); display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 56px; position: relative; }
    .detail-poster-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .detail-sold-out { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.78); color: white; font-size: 14px; font-weight: 700; letter-spacing: 0.12em; text-align: center; padding: 10px 0; }
    .detail-content { padding: 18px; }
    .detail-content h2 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
    .detail-meta { font-size: 13px; color: var(--text-muted); margin-bottom: 14px; }
    .detail-desc { font-size: 15px; color: var(--text-muted); line-height: 1.65; margin-bottom: 22px; }
    .bubbles-row { display: flex; flex-wrap: wrap; gap: 12px; }
    .person-bubble { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .person-av { width: 46px; height: 46px; border-radius: 50%; background: var(--pink-light); border: 2px solid var(--pink-mid); display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .person-name { font-size: 10px; color: var(--text-muted); max-width: 54px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .admin-lock { padding: 50px 16px; display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .admin-lock i { font-size: 48px; color: var(--text-muted); }
    .admin-lock p { font-size: 15px; color: var(--text-muted); }
    .admin-lock input { padding: 11px 16px; border-radius: var(--radius-md); border: 0.5px solid var(--border); background: var(--bg2); color: var(--text); font-size: 15px; text-align: center; width: 180px; outline: none; }
    .admin-lock button { padding: 11px 28px; border-radius: var(--radius-md); border: none; background: var(--purple); color: white; font-size: 15px; font-weight: 600; cursor: pointer; }
    .admin-section { padding: 0 16px; margin-bottom: 26px; }
    .admin-section > h3 { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.08em; }
    .admin-card { background: var(--bg2); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 16px; }
    .field-group { margin-bottom: 13px; }
    .field-group label { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 5px; }
    .field-group input, .field-group textarea { width: 100%; padding: 10px 12px; border-radius: var(--radius-md); border: 0.5px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; outline: none; font-family: inherit; }
    .field-group input:focus, .field-group textarea:focus { border-color: var(--purple); }
    .field-group textarea { min-height: 75px; resize: vertical; }
    .add-btn    { width: 100%; padding: 12px; border-radius: var(--radius-md); border: none; background: var(--purple); color: white; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 4px; }
    .save-btn   { width: 100%; padding: 12px; border-radius: var(--radius-md); border: none; background: #3B6D11; color: white; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 4px; }
    .cancel-btn { width: 100%; padding: 12px; border-radius: var(--radius-md); border: 0.5px solid var(--border); background: var(--bg); color: var(--text-muted); font-size: 14px; cursor: pointer; margin-top: 8px; }
    .danger-btn { width: 100%; padding: 12px; border-radius: var(--radius-md); border: none; background: #A32D2D; color: white; font-size: 14px; font-weight: 600; cursor: pointer; }
    .sync-row { display: flex; align-items: center; gap: 8px; }
    .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #639922; flex-shrink: 0; }
    .sync-dot.off { background: var(--text-muted); }
    .sync-txt { font-size: 12px; color: var(--text-muted); }
    .admin-movie-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
    .admin-movie-row:last-child { border-bottom: none; }
    .admin-movie-info { flex: 1; min-width: 0; }
    .admin-movie-info .amtitle { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .admin-movie-info .amdate  { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .row-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .icon-btn { width: 32px; height: 32px; border-radius: var(--radius-md); border: 0.5px solid var(--border); background: var(--bg); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--text-muted); }
    .icon-btn.edit:hover   { color: var(--purple); border-color: var(--purple); }
    .icon-btn.delete:hover { color: #A32D2D; border-color: #A32D2D; }
    .stat-row { padding: 11px 0; border-bottom: 0.5px solid var(--border); }
    .stat-row:last-child { border-bottom: none; }
    .stat-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .stat-movie { font-size: 14px; font-weight: 500; }
    .stat-count { font-size: 14px; font-weight: 600; color: var(--purple); }
    .stat-count.full { color: #2c2c2a; }
    .stat-names { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
    .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--purple-dark); color: white; padding: 11px 22px; border-radius: 22px; font-size: 14px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; max-width: 90vw; }
    .toast.show { opacity: 1; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.35); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="app">
  <nav class="nav">
    <button class="nav-btn active" onclick="goPage('home',this)"><i class="ti ti-home"></i><span>בית</span><div class="nav-dot"></div></button>
    <button class="nav-btn" onclick="goPage('schedule',this)"><i class="ti ti-calendar"></i><span>תוכניה</span><div class="nav-dot"></div></button>
    <button class="nav-btn" onclick="goPage('admin',this)"><i class="ti ti-settings"></i><span>ניהול</span><div class="nav-dot"></div></button>
  </nav>

  <!-- HOME -->
  <div id="page-home" class="page active">
    <div class="hero-section">
      <div class="hero-label">הקרנה הבאה</div>
      <div class="hero-title" id="hero-title"></div>
      <div class="hero-date" id="hero-date"></div>
      <div class="poster-stage" id="poster-stage"><div class="skel skel-poster"></div></div>
    </div>
    <div class="rsvp-area">
      <div class="rsvp-box">
        <h3>אני מגיע/ה! 🎉</h3>
        <input class="rsvp-input" id="rsvp-name" placeholder="הכינוי שלך..." maxlength="18" />
        <div class="emoji-row" id="emoji-row"></div>
        <button class="rsvp-btn" id="rsvp-btn" onclick="doRsvp()">אשר/י הגעה</button>
        <div id="capacity-bar-area"></div>
        <div class="attendee-count" id="attendee-count"></div>
      </div>
    </div>
  </div>

  <!-- SCHEDULE -->
  <div id="page-schedule" class="page">
    <div class="page-header"><h2>תוכניה</h2><p>הקרנות בחודשיים הקרובים</p></div>
    <div id="schedule-list">
      <div class="skel skel-card"></div>
      <div class="skel skel-card" style="margin-top:10px"></div>
      <div class="skel skel-card" style="margin-top:10px"></div>
    </div>
  </div>

  <!-- DETAIL -->
  <div id="page-detail" class="page">
    <button class="detail-back" onclick="goPage('schedule',document.querySelectorAll('.nav-btn')[1])"><i class="ti ti-arrow-right"></i> חזרה לתוכניה</button>
    <div class="detail-poster-wrap" id="detail-poster"><i class="ti ti-movie"></i></div>
    <div class="detail-content">
      <h2 id="detail-title"></h2>
      <div class="detail-meta" id="detail-meta"></div>
      <p class="detail-desc" id="detail-desc"></p>
      <h3 style="font-size:16px;font-weight:600;margin-bottom:14px" id="detail-att-title">מגיעים</h3>
      <div class="bubbles-row" id="detail-bubbles"></div>
    </div>
  </div>

  <!-- ADMIN -->
  <div id="page-admin" class="page">
    <div id="admin-lock-screen" class="admin-lock">
      <i class="ti ti-lock"></i>
      <p>דף ניהול — רק למארגנת</p>
      <input type="password" id="admin-pw" placeholder="סיסמה..." onkeydown="if(event.key==='Enter')checkPw()" />
      <button onclick="checkPw()">כניסה</button>
    </div>
    <div id="admin-panel" style="display:none">
      <div class="page-header"><h2>ניהול</h2><p>סרטים, הרשמות ועדכונים</p></div>
      <div class="admin-section">
        <div class="sync-row">
          <div class="sync-dot off" id="sync-dot"></div>
          <span class="sync-txt" id="sync-txt">מתחברת...</span>
        </div>
      </div>
      <div class="admin-section">
        <h3>מי מגיע</h3>
        <div class="admin-card" id="admin-stats"><p style="font-size:13px;color:var(--text-muted)">טוען...</p></div>
      </div>
      <div class="admin-section">
        <h3>סרטים בתוכניה</h3>
        <div class="admin-card" id="admin-movies-list"><p style="font-size:13px;color:var(--text-muted)">טוען...</p></div>
      </div>
      <div class="admin-section">
        <h3 id="form-section-title">הוספת סרט חדש</h3>
        <div class="admin-card">
          <input type="hidden" id="edit-id" value="" />
          <div class="field-group"><label>שם הסרט *</label><input id="a-title" placeholder="שם הסרט..." /></div>
          <div class="field-group"><label>תאריך * (DD/MM/YYYY)</label><input id="a-date" placeholder="20/07/2025" /></div>
          <div class="field-group"><label>שעה</label><input id="a-time" placeholder="20:00" /></div>
          <div class="field-group"><label>קישור לפוסטר</label><input id="a-poster" placeholder="https://..." /></div>
          <div class="field-group"><label>ז'אנר</label><input id="a-genre" placeholder="דרמה / קומדיה / ..." /></div>
          <div class="field-group"><label>תיאור קצר</label><textarea id="a-desc" placeholder="על מה הסרט..."></textarea></div>
          <div class="field-group"><label>מקסימום משתתפים</label><input id="a-max" type="number" placeholder="11" min="1" max="100" /></div>
          <button class="add-btn" id="form-submit-btn" onclick="submitMovieForm()">הוסיפי סרט לתוכניה</button>
          <button class="cancel-btn" id="form-cancel-btn" style="display:none" onclick="cancelEdit()">ביטול עריכה</button>
        </div>
      </div>
      <div class="admin-section">
        <button class="danger-btn" onclick="if(confirm('למחוק את כל ההרשמות המקומיות?'))clearAllRsvps()">מחיקת הרשמות מקומיות</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SHEETS_URL    = 'https://script.google.com/macros/s/AKfycbxB1Y_-v03KoWaoDbA9469W9w3GnSNsb72r7lEFOzGuW2Ftv-UYh73xg3zbrHahaR9M/exec';
const ADMIN_PW      = '5339';
const CACHE_MOVIES  = 'mn_cache_movies';
const CACHE_RSVPS   = 'mn_cache_rsvps';
const CACHE_TTL     = 5 * 60 * 1000;
const DEFAULT_MAX   = 11;

const EMOJIS    = ['🐱','🦊','🐼','🦋','🌙','⭐','🎸','🌸','🦄','🍕','🎩','🌈','🐸','🦁','🐧','🦉','🍦','🎃','🌺','🎵'];
const MONTHS_HE = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const BUBBLE_POS = [
  {top:'-20px',left:'28px'},{top:'8px',right:'-26px'},{top:'42%',right:'-30px'},
  {bottom:'28px',right:'-18px'},{bottom:'-20px',left:'56px'},{bottom:'8px',left:'-26px'},
  {top:'42%',left:'-30px'},{top:'18px',left:'-18px'}
];

let selectedEmoji = EMOJIS[0];
let movies = [];
let rsvps  = {};

function getMax(m) { return parseInt(m.max_attendees) || DEFAULT_MAX; }
function isFull(m) { return (rsvps[String(m.id)]||[]).length >= getMax(m); }

function cacheGet(key) {
  try { const r=JSON.parse(localStorage.getItem(key)); return r&&Date.now()-r.ts<CACHE_TTL?r.data:null; } catch{return null;}
}
function cacheSet(key,data) { try{localStorage.setItem(key,JSON.stringify({data,ts:Date.now()}));}catch{} }

async function sheetsGet(type) {
  const r=await fetch(SHEETS_URL+'?type='+type+'&t='+Date.now()); return r.json();
}
async function sheetsPost(payload) {
  await fetch(SHEETS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)});
}

function parseRsvps(data) {
  const f={};
  data.forEach(row=>{
    if(!row.movie_id)return;
    const id=String(row.movie_id);
    if(!f[id])f[id]=[];
    if(row.name&&!f[id].find(p=>p.name===row.name))f[id].push({name:row.name,emoji:row.emoji||'⭐'});
  });
  return f;
}

async function initData() {
  const cm=cacheGet(CACHE_MOVIES), cr=cacheGet(CACHE_RSVPS);
  if(cm){movies=cm;renderHome();renderSchedule();}
  if(cr){rsvps=cr;renderHome();renderSchedule();}
  try {
    const [md,rd]=await Promise.all([sheetsGet('movies'),sheetsGet('rsvps')]);
    movies=md.map(m=>({...m,id:String(m.id)}));
    rsvps=parseRsvps(rd);
    cacheSet(CACHE_MOVIES,movies); cacheSet(CACHE_RSVPS,rsvps);
    renderHome(); renderSchedule();
  } catch(e){ if(!cm){renderHome();renderSchedule();} }
}

async function refreshFromSheets() {
  try {
    const [md,rd]=await Promise.all([sheetsGet('movies'),sheetsGet('rsvps')]);
    movies=md.map(m=>({...m,id:String(m.id)}));
    rsvps=parseRsvps(rd);
    cacheSet(CACHE_MOVIES,movies); cacheSet(CACHE_RSVPS,rsvps);
    return true;
  } catch{return false;}
}

function parseDate(s) {
  if(!s)return new Date(0);
  const str=String(s).trim();
  if(str.includes('/')){const[d,m,y]=str.split('/').map(Number);return new Date(y,m-1,d);}
  return new Date(str);
}
function heDate(s){const d=parseDate(s);return `${d.getDate()} ב${MONTHS_HE[d.getMonth()]} ${d.getFullYear()}`;}
function getNextMovie(){
  const now=new Date();now.setHours(0,0,0,0);
  return [...movies].filter(m=>parseDate(m.date)>=now).sort((a,b)=>parseDate(a.date)-parseDate(b.date))[0]||movies[movies.length-1];
}
function getMoviesInRange(){
  const now=new Date();now.setHours(0,0,0,0);
  const end=new Date(now);end.setMonth(end.getMonth()+2);
  return [...movies].filter(m=>{const d=parseDate(m.date);return d>=now&&d<=end;}).sort((a,b)=>parseDate(a.date)-parseDate(b.date));
}

function renderEmojis(){
  document.getElementById('emoji-row').innerHTML=EMOJIS.map(e=>
    `<button class="emoji-opt${e===selectedEmoji?' selected':''}" onclick="selectEmoji('${e}')">${e}</button>`
  ).join('');
}
function selectEmoji(e){selectedEmoji=e;renderEmojis();}

function renderHome(){
  const movie=getNextMovie();
  if(!movie){
    document.getElementById('hero-title').textContent='אין הקרנות קרובות';
    document.getElementById('hero-date').textContent='';
    document.getElementById('poster-stage').innerHTML='<div class="poster-placeholder"><i class="ti ti-movie"></i><span>בקרוב...</span></div>';
    document.getElementById('rsvp-btn').disabled=true;
    document.getElementById('attendee-count').textContent='';
    document.getElementById('capacity-bar-area').innerHTML='';
    renderEmojis(); return;
  }
  document.getElementById('hero-title').textContent=movie.title;
  document.getElementById('hero-date').textContent=`${heDate(movie.date)} • ${movie.time}`;

  const att=rsvps[String(movie.id)]||[];
  const max=getMax(movie);
  const full=att.length>=max;

  const bubbles=att.slice(0,8).map((p,i)=>{
    const pos=BUBBLE_POS[i%BUBBLE_POS.length];
    const s=Object.entries(pos).map(([k,v])=>`${k}:${v}`).join(';');
    return `<div class="bubble" style="${s}"><span>${p.emoji}</span><div class="bubble-tip">${p.name}</div></div>`;
  }).join('');
  const soldOutBanner=full?'<div class="sold-out-banner">🎟️ SOLD OUT</div>':'';
  const poster=movie.poster
    ?`<img src="${movie.poster}" class="poster-img" alt="${movie.title}" onerror="this.outerHTML='<div class=poster-placeholder><i class=ti-movie></i><span>${movie.title}</span></div>'">`
    :`<div class="poster-placeholder"><i class="ti ti-movie"></i><span>${movie.title}</span></div>`;
  document.getElementById('poster-stage').innerHTML=poster+bubbles+soldOutBanner;

  // כפתור
  const btn=document.getElementById('rsvp-btn');
  const already=!!localStorage.getItem('mn_me_'+movie.id);
  if(already){ btn.textContent='✓ אישרת הגעה!'; btn.disabled=true; btn.className='rsvp-btn'; }
  else if(full){ btn.textContent='🎟️ SOLD OUT'; btn.disabled=true; btn.className='rsvp-btn sold-out-btn'; }
  else{ btn.textContent='אשר/י הגעה'; btn.disabled=false; btn.className='rsvp-btn'; }

  // פס קיבולת
  const pct=Math.min(100,Math.round(att.length/max*100));
  document.getElementById('capacity-bar-area').innerHTML=`
    <div class="capacity-bar-wrap">
      <div class="capacity-label"><span>${att.length}/${max} משתתפים</span><span>${full?'מלא!':max-att.length+' מקומות פנויים'}</span></div>
      <div class="capacity-bar"><div class="capacity-fill${full?' full':''}" style="width:${pct}%"></div></div>
    </div>`;
  document.getElementById('attendee-count').textContent='';
  renderEmojis();
}

async function doRsvp(){
  const movie=getNextMovie(); if(!movie)return;
  const name=document.getElementById('rsvp-name').value.trim();
  if(!name){showToast('כתבי את הכינוי שלך 😊');return;}
  const id=String(movie.id);
  if(!rsvps[id])rsvps[id]=[];
  if(isFull(movie)){showToast('ההקרנה מלאה!');return;}
  if(rsvps[id].find(p=>p.name===name)){showToast('הכינוי הזה כבר נרשם!');return;}
  const btn=document.getElementById('rsvp-btn');
  btn.innerHTML='<span class="spinner"></span>שולח...'; btn.disabled=true;
  try{
    await sheetsPost({action:'addRsvp',movie_id:movie.id,movie_title:movie.title,name,emoji:selectedEmoji});
    rsvps[id].push({name,emoji:selectedEmoji});
    cacheSet(CACHE_RSVPS,rsvps);
    localStorage.setItem('mn_me_'+movie.id,name);
    showToast('נרשמת! מחכות לך 🎉');
  }catch{
    rsvps[id].push({name,emoji:selectedEmoji});
    localStorage.setItem('mn_me_'+movie.id,name);
    showToast('נרשמת! (ללא חיבור לרשת)');
  }
  renderHome();
}

function renderSchedule(){
  const range=getMoviesInRange(),list=document.getElementById('schedule-list');
  if(!range.length){list.innerHTML='<div class="empty-state"><i class="ti ti-calendar-off"></i><p>אין הקרנות בחודשיים הקרובים</p></div>';return;}
  const next=getNextMovie();
  const byMonth={};
  range.forEach(m=>{
    const d=parseDate(m.date),k=`${d.getMonth()}_${d.getFullYear()}`;
    if(!byMonth[k])byMonth[k]={label:`${MONTHS_HE[d.getMonth()]} ${d.getFullYear()}`,movies:[]};
    byMonth[k].movies.push(m);
  });
  list.innerHTML=Object.values(byMonth).map(({label,movies:ms})=>
    `<div class="month-section"><div class="month-label">${label}</div>${ms.map(m=>{
      const att=(rsvps[String(m.id)]||[]).length;
      const max=getMax(m);
      const full=att>=max;
      const isNext=next&&String(m.id)===String(next.id);
      const thumb=m.poster
        ?`<img src="${m.poster}" alt="${m.title}" loading="lazy" onerror="this.parentElement.innerHTML='<i class=\\'ti ti-movie\\'></i>'">`
        :'<i class="ti ti-movie"></i>';
      const soldOutOverlay=full?'<div class="thumb-sold-out">SOLD OUT</div>':'';
      const badge=full
        ?'<span class="sold-out-badge">SOLD OUT</span>'
        :isNext?'<span class="next-badge">הבא</span>':'';
      return `<div class="movie-card" onclick="goDetail('${m.id}')">
        <div class="movie-thumb">${thumb}${soldOutOverlay}</div>
        <div class="movie-info">
          <h4>${badge} ${m.title}</h4>
          <div class="meta">${heDate(m.date)} • ${m.time}${m.genre?' • '+m.genre:''}</div>
          <div class="attendees-pill${full?' full':''}"><i class="ti ti-users" style="font-size:12px"></i> ${att}/${max}${full?' · מלא':''}</div>
        </div>
        <i class="ti ti-chevron-left" style="color:var(--text-muted);font-size:16px;flex-shrink:0"></i>
      </div>`;
    }).join('')}</div>`
  ).join('');
}

function goDetail(id){
  const m=movies.find(x=>String(x.id)===String(id)); if(!m)return;
  document.getElementById('detail-title').textContent=m.title;
  document.getElementById('detail-meta').textContent=`${heDate(m.date)} • ${m.time}${m.genre?' • '+m.genre:''}`;
  document.getElementById('detail-desc').textContent=m.desc||'';
  const att=rsvps[String(m.id)]||[];
  const max=getMax(m);
  const full=att.length>=max;
  const dp=document.getElementById('detail-poster');
  const soldOutEl=full?'<div class="detail-sold-out">🎟️ SOLD OUT</div>':'';
  dp.innerHTML=(m.poster?`<img src="${m.poster}" style="width:100%;height:100%;object-fit:cover" alt="${m.title}">`:'<i class="ti ti-movie"></i>')+soldOutEl;
  document.getElementById('detail-att-title').textContent=`מגיעים (${att.length}/${max})`;
  document.getElementById('detail-bubbles').innerHTML=att.length===0
    ?'<p style="font-size:13px;color:var(--text-muted)">עדיין אין הרשמות</p>'
    :att.map(p=>`<div class="person-bubble"><div class="person-av">${p.emoji}</div><div class="person-name">${p.name}</div></div>`).join('');
  document.querySelectorAll('.nav-btn,.page').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-detail').classList.add('active');
}

function checkPw(){
  if(document.getElementById('admin-pw').value===ADMIN_PW){
    document.getElementById('admin-lock-screen').style.display='none';
    document.getElementById('admin-panel').style.display='block';
    loadAdminData();
  }else showToast('סיסמה שגויה');
}

async function loadAdminData(){
  const dot=document.getElementById('sync-dot'),txt=document.getElementById('sync-txt');
  txt.textContent='מתחברת לגוגל שיטס...';
  const ok=await refreshFromSheets();
  dot.classList.toggle('off',!ok);
  txt.textContent=ok?'מחוברת לגוגל שיטס ✓':'לא ניתן להתחבר';
  renderAdminStats(); renderAdminMoviesList(); renderHome(); renderSchedule();
}

function renderAdminStats(){
  const range=getMoviesInRange(),container=document.getElementById('admin-stats');
  if(!range.length){container.innerHTML='<p style="font-size:13px;color:var(--text-muted)">אין הקרנות בחודשיים הקרובים</p>';return;}
  container.innerHTML=range.map(m=>{
    const att=rsvps[String(m.id)]||[];
    const max=getMax(m);
    const full=att.length>=max;
    return `<div class="stat-row">
      <div class="stat-top">
        <span class="stat-movie">${m.title}${full?' 🎟️':''}</span>
        <span class="stat-count${full?' full':''}">${att.length}/${max}</span>
      </div>
      <div class="stat-names">${att.length?att.map(p=>`${p.emoji} ${p.name}`).join(' · '):'אין הרשמות עדיין'}</div>
    </div>`;
  }).join('');
}

function renderAdminMoviesList(){
  const container=document.getElementById('admin-movies-list');
  const sorted=[...movies].sort((a,b)=>parseDate(a.date)-parseDate(b.date));
  if(!sorted.length){container.innerHTML='<p style="font-size:13px;color:var(--text-muted)">אין סרטים — הוסיפי את הראשון!</p>';return;}
  container.innerHTML=sorted.map(m=>`
    <div class="admin-movie-row">
      <div class="admin-movie-info">
        <div class="amtitle">${m.title}</div>
        <div class="amdate">${heDate(m.date)} • ${m.time} • מקס׳ ${getMax(m)}</div>
      </div>
      <div class="row-actions">
        <button class="icon-btn edit" onclick="startEdit('${m.id}')"><i class="ti ti-edit"></i></button>
        <button class="icon-btn delete" onclick="deleteMovie('${m.id}')"><i class="ti ti-trash"></i></button>
      </div>
    </div>`).join('');
}

function startEdit(id){
  const m=movies.find(x=>String(x.id)===String(id)); if(!m)return;
  document.getElementById('edit-id').value=id;
  document.getElementById('a-title').value=m.title;
  document.getElementById('a-date').value=m.date;
  document.getElementById('a-time').value=m.time||'';
  document.getElementById('a-poster').value=m.poster||'';
  document.getElementById('a-genre').value=m.genre||'';
  document.getElementById('a-desc').value=m.desc||'';
  document.getElementById('a-max').value=getMax(m);
  document.getElementById('form-section-title').textContent='עריכת סרט';
  document.getElementById('form-submit-btn').textContent='שמרי שינויים';
  document.getElementById('form-submit-btn').className='save-btn';
  document.getElementById('form-cancel-btn').style.display='block';
  document.getElementById('form-section-title').scrollIntoView({behavior:'smooth'});
}

function cancelEdit(){
  document.getElementById('edit-id').value='';
  ['a-title','a-date','a-time','a-poster','a-genre','a-desc','a-max'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('form-section-title').textContent='הוספת סרט חדש';
  document.getElementById('form-submit-btn').textContent='הוסיפי סרט לתוכניה';
  document.getElementById('form-submit-btn').className='add-btn';
  document.getElementById('form-cancel-btn').style.display='none';
}

function submitMovieForm(){
  const editId=document.getElementById('edit-id').value;
  if(editId)saveEdit(editId); else addMovie();
}

async function addMovie(){
  const title=document.getElementById('a-title').value.trim();
  const date=document.getElementById('a-date').value.trim();
  if(!title||!date){showToast('שם ותאריך הם שדות חובה');return;}
  const btn=document.getElementById('form-submit-btn');
  btn.textContent='שומר...'; btn.disabled=true;
  const newMovie={id:String(Date.now()),title,date,
    time:document.getElementById('a-time').value.trim()||'20:00',
    poster:document.getElementById('a-poster').value.trim(),
    genre:document.getElementById('a-genre').value.trim(),
    desc:document.getElementById('a-desc').value.trim(),
    max_attendees:document.getElementById('a-max').value||DEFAULT_MAX};
  try{
    await sheetsPost({action:'addMovie',...newMovie});
    movies.push(newMovie); cacheSet(CACHE_MOVIES,movies);
    ['a-title','a-date','a-time','a-poster','a-genre','a-desc','a-max'].forEach(id=>document.getElementById(id).value='');
    renderAdminMoviesList(); renderAdminStats(); renderSchedule(); renderHome();
    showToast('הסרט נוסף ✓');
  }catch{showToast('שגיאה בשמירה — נסי שוב');}
  btn.textContent='הוסיפי סרט לתוכניה'; btn.disabled=false;
}

async function saveEdit(id){
  const title=document.getElementById('a-title').value.trim();
  const date=document.getElementById('a-date').value.trim();
  if(!title||!date){showToast('שם ותאריך הם שדות חובה');return;}
  const btn=document.getElementById('form-submit-btn');
  btn.textContent='שומר...'; btn.disabled=true;
  const updated={id,title,date,
    time:document.getElementById('a-time').value.trim()||'20:00',
    poster:document.getElementById('a-poster').value.trim(),
    genre:document.getElementById('a-genre').value.trim(),
    desc:document.getElementById('a-desc').value.trim(),
    max_attendees:document.getElementById('a-max').value||DEFAULT_MAX};
  try{
    await sheetsPost({action:'editMovie',...updated});
    const idx=movies.findIndex(m=>String(m.id)===String(id));
    if(idx!==-1)movies[idx]=updated; cacheSet(CACHE_MOVIES,movies);
    cancelEdit();
    renderAdminMoviesList(); renderAdminStats(); renderSchedule(); renderHome();
    showToast('הסרט עודכן ✓');
  }catch{showToast('שגיאה בעדכון — נסי שוב');}
  btn.disabled=false;
}

async function deleteMovie(id){
  const m=movies.find(x=>String(x.id)===String(id)); if(!m)return;
  if(!confirm(`למחוק את "${m.title}"?`))return;
  try{
    await sheetsPost({action:'deleteMovie',id});
    movies=movies.filter(x=>String(x.id)!==String(id)); cacheSet(CACHE_MOVIES,movies);
    renderAdminMoviesList(); renderAdminStats(); renderSchedule(); renderHome();
    showToast('הסרט נמחק');
  }catch{showToast('שגיאה במחיקה — נסי שוב');}
}

function clearAllRsvps(){rsvps={};localStorage.removeItem(CACHE_RSVPS);renderAdminStats();renderHome();showToast('ההרשמות המקומיות נמחקו');}

function goPage(name,btn){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  if(btn)btn.classList.add('active');
  document.getElementById('page-'+name).classList.add('active');
  if(name==='home')renderHome();
  if(name==='schedule')renderSchedule();
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

renderEmojis();
initData();
</script>
</body>
</html>
